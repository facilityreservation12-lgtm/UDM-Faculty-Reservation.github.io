<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Universidad de Manila</title>
  <link rel="icon" type="image/png" href="images/udm-logo.webp"/>
  <link rel="stylesheet" href="CSS/login.css" />
  
  <!-- 1. Supabase library FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- 2. Supabase config SECOND -->
  <script>
    window.SUPABASE_URL = 'https://tryytusvitsztadzqihq.supabase.co';
    window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyeXl0dXN2aXRzenRhZHpxaWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODQyMTQsImV4cCI6MjA5NzM2MDIxNH0.R9GkjYXhvoN3Jw8nOkiparyHQRCE6uqZMAPpX3edAxA';
    window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
  </script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <a href="login.html" class="back-arrow">←</a>
      <img src="images/udm-logo.webp" alt="UDM Logo" class="logo" />
      <h1>UNIVERSIDAD DE MANILA</h1>
      <small>Former City College of Manila</small>
      <h2 style="margin-top: 1rem;">Set New Password</h2>
      
      <form id="resetPasswordForm">
        <div class="password-wrapper">
          <input type="password" id="newPassword" placeholder="New Password" required minlength="8" />
          <span class="toggle-password" data-target="newPassword">👁️</span>
        </div>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="8" />
          <span class="toggle-password" data-target="confirmPassword">👁️</span>
        </div>
        <button type="submit" id="resetBtn">Reset Password</button>
      </form>
      
      <div id="statusMessage" class="status-message"></div>
    </div>
  </div>

  <!-- Loading Modal -->
  <div id="loadingModal" class="loading-modal">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div id="loadingText" class="loading-text">Loading...</div>
      <div id="loadingSubtext" class="loading-subtext">Please wait</div>
    </div>
  </div>

  <!-- Custom Alert Modal -->
  <div id="customAlertModal" class="custom-modal">
    <div class="custom-modal-content">
      <button class="modal-close" onclick="closeCustomAlert()">&times;</button>
      <div id="alertIcon" class="modal-icon"></div>
      <h3 id="alertTitle" class="modal-title"></h3>
      <p id="alertMessage" class="modal-message"></p>
      <div id="alertButtons" class="modal-buttons">
        <button class="modal-btn primary" onclick="closeCustomAlert()">OK</button>
      </div>
    </div>
  </div>

  <script src="Javascript/alert.js"></script>
  <script src="Javascript/reset-password.js"></script>
</body>
</html>
