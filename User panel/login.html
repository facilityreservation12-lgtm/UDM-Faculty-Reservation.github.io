<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Universidad de Manila</title>
  <link rel="icon" type="image/png" href="images/udm-logo.webp"/>
  <link rel="stylesheet" href="CSS/login.css" />
  
  <!-- 1. Supabase library FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- 2. Supabase config SECOND -->
  <script>
    window.SUPABASE_URL = 'https://tryytusvitsztadzqihq.supabase.co';
    window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyeXl0dXN2aXRzenRhZHpxaWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODQyMTQsImV4cCI6MjA5NzM2MDIxNH0.R9GkjYXhvoN3Jw8nOkiparyHQRCE6uqZMAPpX3edAxA';
    window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
  </script>
  
  <!-- 3. Alert functions -->
  <script defer src="Javascript/alert.js"></script>
  
  <!-- 4. Login script -->
  <script defer src="Javascript/login.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <a href="LandingPage.html" class="back-arrow">←</a>
      <img src="../User panel/images/udm-logo.webp" alt="UDM Logo" class="logo" />
      <h1>UNIVERSIDAD DE MANILA</h1>
      <small>Former City College of Manila</small>
      <p>Please select your role to log in</p>

      <div class="role-select">
        <button id="facultyBtn" type="button">Faculty</button>
        <button id="studentOrgBtn" type="button">Student Org</button>
        <button id="adminBtn" type="button">Admin</button>
        <button id="superAdminBtn" type="button">Super Admin</button>
      </div>

      <form class="login-form" style="display:none;">
        <input type="hidden" id="role" name="role" value="" />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">LOG IN</button>
        <div class="forgot-password">
          <a href="#" id="forgotPasswordLink">Forgot Password?</a>
        </div>
      </form>
    </div>
    
    <!-- Modal for Forgot Password -->
    <div id="forgotPasswordModal" class="modal" style="display:none;">
      <div class="login-box modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <img src="images/udm-logo.webp" alt="UDM Logo" class="logo" />
        <h1>UNIVERSIDAD DE MANILA</h1>
        <small>Former City College of Manila</small>
        <h2 style="margin-top: 1rem;">Reset Password</h2>
        <form id="forgotPasswordForm">
          <input type="email" id="resetEmail" placeholder="Enter your Email Address" required />
          <p class="reset-instructions">Enter your email address and we'll send a password reset link.</p>
          <button type="submit" id="sendResetBtn">Send Reset Link</button>
          <div id="resetStatus" class="reset-status"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Custom Alert Modal -->
  <div id="customAlertModal" class="custom-modal">
    <div class="custom-modal-content">
      <button class="modal-close" onclick="closeCustomAlert()">&times;</button>
      <div id="alertIcon" class="modal-icon"></div>
      <h3 id="alertTitle" class="modal-title"></h3>
      <p id="alertMessage" class="modal-message"></p>
      <div id="alertButtons" class="modal-buttons">
        <button class="modal-btn primary" onclick="closeCustomAlert()">OK</button>
      </div>
    </div>
  </div>

  <!-- Loading Modal -->
  <div id="loadingModal" class="loading-modal">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div id="loadingText" class="loading-text">Loading...</div>
      <div id="loadingSubtext" class="loading-subtext">Please wait</div>
    </div>
  </div>
</body>
</html>
